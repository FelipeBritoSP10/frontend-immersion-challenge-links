<section class="profile-container" aria-labelledby="profile-title">
    <h1 id="profile-title" class="main-title">Quem está assistindo?</h1>
    <div class="profiles-wrapper">
        <ul class="profiles-list">
            <li class="profile-item">
                <button class="profile-btn" aria-label="Acessar perfil de Gustavo">
                    <div class="avatar-box"><img src="./imgs/profile1.jpg" alt="Avatar Gustavo"></div>
                    <span class="profile-name">Gustavo</span>
                </button>
            </li>
            <li class="profile-item">
                <button class="profile-btn" aria-label="Acessar perfil de Thiago">
                    <div class="avatar-box"><img src="./imgs/profile2.jpg" alt="Avatar Thiago"></div>
                    <span class="profile-name">Thiago</span>
                </button>
            </li>
            <li class="profile-item">
                <button class="profile-btn" aria-label="Acessar perfil de Thamiris">
                    <div class="avatar-box"><img src="./imgs/profile3.jpg" alt="Avatar Thamiris"></div>
                    <span class="profile-name">Thamiris</span>
                </button>
            </li>
            <li class="profile-item">
                <button class="profile-btn" aria-label="Acessar perfil de Vini">
                    <div class="avatar-box"><img src="./imgs/profile4.jpg" alt="Avatar Vini"></div>
                    <span class="profile-name">Vini</span>
                </button>
            </li>
            <li class="profile-item">
                <a href="#" class="profile-link add-btn" aria-label="Adicionar novo perfil">
                    <div class="avatar-box plus-icon" aria-hidden="true"><span>+</span></div>
                    <span class="profile-name">Novo Perfil</span>
                </a>
            </li>
        </ul>
    </div>
    <div class="manage-area">
        <button class="btn-manage" type="button">Gerenciar Perfis</button>
    </div>
</section>
